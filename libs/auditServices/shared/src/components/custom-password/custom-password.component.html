<p-password
  [inputId]="inputId()"
  [placeholder]="placeholder()"
  [toggleMask]="toggleMask()"
  [feedback]="feedback()"
  [disabled]="isDisabled || disabled()"
  [styleClass]="passwordClass()"
  [promptLabel]="promptLabel()"
  [weakLabel]="weakLabel()"
  [mediumLabel]="mediumLabel()"
  [strongLabel]="strongLabel()"
  [(ngModel)]="value"
  (ngModelChange)="onValueChange($event)"
></p-password>
