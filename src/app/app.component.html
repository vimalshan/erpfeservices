@if (isSuaadhyaUser && coBrowsingSharedService.getCoBrowsingUserEmail()) {
  <router-outlet></router-outlet>
  <lib-spinner></lib-spinner>
} @else {
  @if (coBrowsingSharedService.getCoBrowsingUserEmail()) {
    <erp-services-navbar-co-browsing></erp-services-navbar-co-browsing>
  }
  <div class="app-container">
    @if (isLoggedIn) {
      <erp-services-navbar (toggleSidebarEvent)="sidebarMobile.onToggle($event)"></erp-services-navbar>
      <erp-services-sidebar></erp-services-sidebar>
      <erp-services-footer></erp-services-footer>
    }

    <main [ngClass]="{ 'no-breadcrumb': !breadcrumbVisibility }">
      @if (isLoggedIn) {
        <erp-services-breadcrumb></erp-services-breadcrumb>
      }
      <div class="content">
        <lib-spinner></lib-spinner>
        <router-outlet></router-outlet>
      </div>
      <erp-services-sidebar-mobile #sidebarMobile></erp-services-sidebar-mobile>
    </main>
  </div>
}

<shared-custom-confirm-dialog></shared-custom-confirm-dialog>
<shared-custom-toast></shared-custom-toast>
